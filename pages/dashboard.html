<h2 class="page-title">Dashboard</h2>

<div class="cards">
  <!-- ================= ROW 1 ================= -->

  <!-- OMSET -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="dollar-sign"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Omset</div>
        <div class="card-value" id="dash-omset">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth up" id="growth-omset">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- KAS MASUK -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="arrow-down-circle"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Kas Masuk</div>
        <div class="card-value" id="dash-kas-masuk">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth up">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- KAS KELUAR -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="arrow-up-circle"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Kas Keluar</div>
        <div class="card-value" id="dash-kas-keluar">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth down">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- ================= ROW 2 ================= -->

  <!-- NOTA -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="file-text"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Nota</div>
        <div class="card-value" id="dash-nota">0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth up" id="growth-nota">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- QTY -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="shopping-cart"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Qty Terjual</div>
        <div class="card-value" id="dash-qty">0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth up" id="growth-qty">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- RATA -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="bar-chart"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Rata Transaksi</div>
        <div class="card-value" id="dash-rata">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-growth down" id="growth-rata">-</span>
      <span class="card-period">Bulan ini</span>
    </div>
  </div>

  <!-- ================= ROW 3 ================= -->

  <!-- PIUTANG -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="wallet"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Piutang</div>
        <div class="card-value" id="dash-piutang">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-period">Belum lunas</span>
    </div>
  </div>

  <!-- HUTANG -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="credit-card"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Hutang</div>
        <div class="card-value" id="dash-hutang">Rp 0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-period">Belum bayar</span>
    </div>
  </div>

  <!-- CUSTOMER -->
  <div class="card">
    <div class="card-top">
      <div class="card-icon">
        <i data-lucide="users"></i>
      </div>
      <div class="card-info">
        <div class="card-title">Customer Aktif</div>
        <div class="card-value" id="dash-customer">0</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-period">Bulan ini</span>
    </div>
  </div>
</div>
